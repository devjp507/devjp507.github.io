   <hr>

   Magnitude:
   <label><input type="radio" name="comparisonOp" value="lessThanOrEqualTo"> ≤ </label>
   <label><input type="radio" name="comparisonOp" value="equalTo"> = </label>

   <label><input type="range" id="mag" name="mag" min="1.0" max="9.9" step="0.1" value="1.0" oninput="magValue.value = this.value"></label>
