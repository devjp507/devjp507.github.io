<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="css/style.css">

</head>
<body>
    <h1> Earthquake Search</h1>
<form id="searchResults" action="searchResult.html">
   <hr>
   <div id="calendars"> 
   <table id="startCalendar" data-str="start">
      <caption><h2> Start Date</h2></caption>
      <caption>
         <select id="startYear" name="startYear" class="start">
         </select>
      </caption>
      <caption>
         <select id="startMonth" name="startMonth" class="start">
            <option value="1" selected>January </option>
            <option value="2">February</option>
            <option value="3">March</option>
            <option value="4">April</option>
            <option value="5">May</option>
            <option value="6">June</option>
            <option value="7">July</option>
            <option value="8">August</option>
            <option value="9">September</option>
            <option value="10">October</option>
            <option value="11">November</option>
            <option value="12">December</option>
         </select>
      </caption>
   </table>

   <table id="endCalendar" data-str="end">
      <caption><h2> End Date</h2></caption>
      <caption>
         <select id="endYear" name="endYear" class="end">
         </select>
      </caption>
      <caption>
         <select id="endMonth" name="endMonth" class="end">
            <option value="1" selected>January </option>
            <option value="2">February</option>
            <option value="3">March</option>
            <option value="4">April</option>
            <option value="5">May</option>
            <option value="6">June</option>
            <option value="7">July</option>
            <option value="8">August</option>
            <option value="9">September</option>
            <option value="10">October</option>
            <option value="11">November</option>
            <option value="12">December</option>
         </select>
      </caption>
   </table>
   </div>

   <hr>

   Magnitude:
   <label><input type="radio" name="comparisonOp" value="lessThanOrEqualTo"> ≤ </label>
   <label><input type="radio" name="comparisonOp" value="equalTo"> = </label>
   <label><input type="radio" name="comparisonOp" value="greaterThanOrEqualTo"> ≥ </label>
   <label><input type="range" id="mag" name="mag" min="1.0" max="9.9" step="0.1" value="1.0" oninput="magValue.value = this.value"></label>
   <output id="magValue"></output>


   <hr>
   <button>Search!</button>
</form>

    <script src="js/script.js"> </script>
</body>
</html>
