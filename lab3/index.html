<!DOCTYPE html>
<html>
<head>
   <meta charset="utf-8">
   <title> Sign Up Page </title>
   <link rel="stylesheet" href="css/style.css">
</head>

<body>
<h1> Sign Up Form</h1>
<form id="signupForm" action="welcome.html">
   <hr>
   <h2>Personal Information</h2>
  <label> First Name:
    <input type="text" id="fName" name="fName"><br>
  </label>

  <label>Last Name:
     <input type="text" id="lName" name="lName"><br>
  </label>

  Gender:
  <label><input type="radio" name="gender" value="m"> Male</label>
  <label><input type="radio" name="gender" value="f"> Female</label><br>

   <hr>
   <h2>Based out of</h2>

  <label>Zip Code:
     <input type="text" id="zip" name="zip"><br>
  </label>

  City: <span id="city"></span><br>
  Latitude: <span id="latitude"></span><br>
  Longitude: <span id="longitude"></span><br>

  <label>State:
    <select id="state" name="state">
        <option value="">Loading states...</option>
    </select><br>
  </label>

  <label>Select a County:
     <select id="county" name="county"></select><br>
  </label>

   <hr>
   <h2>Password & Username</h2>

  <label>Desired Username:
     <input type="text" id="username" name="username">
  </label>
  <span id="usernameError"></span><br>

  <!-- <label>Password:
  <input type="password" id="password" name="password">
  </label>
  <span id="passwordSuggestion"></span><br>
  <span id="passwordError"></span><br> -->

   <label>Password:
      <input type="password" id="password" name="password">
   </label>
   <span id="passwordError"></span><br>

   <span id="password_Suggestion" hidden>
      <input type="checkbox" id="passwordCB" name="suggested">
      <label for="passwordCB">Use Suggested Password: <span id="passwordSuggestion"></span></label>
   </span><br>

  <label>Type Password Again:
     <input type="password" id="passwordAgain" name="passwordAgain">
  </label>
  <span id="passwordAgainError"></span><br>

  <button>Sign up!</button>
</form>
<script src="js/script.js"></script>
</body>
</html>
